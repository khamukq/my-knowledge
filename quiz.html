<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <style>
    body {
        background-color: #1a1a1a;  
        color: #ffffff;              
        font-family: Arial, sans-serif;
        padding: 20px;
       text-align: center;
    }
    
    .question {
        background-color: #ffffff;   
        color: #000000;              
        padding: 15px;
        margin-bottom: 20px;
        border-radius: 10px;
      text-align: left;
    }
    
    button {
        background-color: #007bff;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }
    
    .result {
        background-color: #ffffff;
        color: #000000;
        padding: 15px;
        border-radius: 10px;
        margin-top: 20px; }
    
    #startScreen {
        text-align: center;
    }
    
    #startScreen img {
        display: block;
        margin-left: auto;
        margin-right: auto;
    }
    
    #start-btn {
        display: block;
        margin-left: auto;
        margin-right: auto;
        margin-top: 20px;
    }
</style>
    <title> Викторина основанная на железе компа </title>
  </head>
  <body>
    <button id="restart-btn" onclick="restartQuiz()" style="display: none; margin-top: 20px;">🔄 Пройти заново</button>
    <div id = "startScreen">
    <h2> Проверь же свой мегамозг на знания</h2>
      <p> Всего 5 легких вопросов </p>
      <img src="https://avatars.mds.yandex.net/i?id=f04492fc8a89509999d2a541b8621413_l-4012518-images-thumbs&n=13" alt="Компьютер" width="300" style="margin-bottom: 15px;">
      <button id="start-btn">Начать викторину</button>
    </div>
    <div id="quiz-container" style="display: none;">
          <h1> Тест: мои знания в компах </h1>
      <p id="question-counter" style="font-size: 18px; margin-bottom: 20px;"> Вопрос 1 из 5</p>
<div id="question1" class="question">
  <p>1. Что такое <strong>кэш</strong> в процессоре </p>
  <label><input type="radio" name="q1" value="wrong2" > Это ядра процессора </label><br>
  <label><input type="radio" name="q1" value="correct" > Это память процессора </label><br>
  <label><input type="radio" name="q1" value="wrong1">  Это потоки процессора </label><br>
</div>
  <div id="question2" class="question" style="display: none;">
  <p>2. Какие виды <strong>видеопамяти</strong> в видеокарте </p>
  <label><input type="radio" name="q2" value="wrong2" > DDR2 DDR </label><br>
  <label><input type="radio" name="q2" value="correct" > GDDR6X GDDR5 </label><br>
  <label><input type="radio" name="q2" value="wrong1">  У видеокарты нет видеопамяти </label>
</div>
    <div id="question3" class="question" style="display: none;">
  <p>3. Что такое <strong>SSD</strong> в компьютере </p>
  <label><input type="radio" name="q3" value="correct" > Это устройство хранения данных </label><br>
  <label><input type="radio" name="q3" value="wrong2" > Это устройство выводящее видеокартинку </label><br>
  <label><input type="radio" name="q3" value="wrong1">  Это устройство которое отвечает за подсветку </label>
  <label><input type="radio" name="q3" value="wrong3">  Это устройство которое отвечает за локальные сети </label>
</div>
     <div id="question4" class="question" style="display: none;">
  <p>4. Что такое <strong>ОЗУ</strong> в компьютере </p>
  <label><input type="radio" name="q4" value="correct" > Это устройство которое временно хранит память </label><br>
  <label><input type="radio" name="q4" value="wrong2" > Это устройство что регулирует скорость кулеров </label><br>
  <label><input type="radio" name="q4" value="wrong1">  Это устройство которое отвечает за питание компьютера </label>
</div>
     <div id="question5" class="question" style="display: none;">
  <p>5. Что такое <strong>БП</strong> в компьютере </p>
  <label><input type="radio" name="q5" value="wrong2" > Это устройство которое выводит звук </label><br>
  <label><input type="radio" name="q5" value="wrong1" > Это устройство выводящее видеокартинку </label><br>
  <label><input type="radio" name="q5" value="correct">  Это устройство которое отвечает за питание устройств компьютера </label>
</div>
      <div id="feedback" style="margin-top: 15px;"></div>
    <button onclick="checkQuiz()">Узнать результат</button>
<div class="result" id="result"></div>
<script>
  let score = 0
  let currentquestion = 1; 
  const correctAnswers = {
    q1: "Это память процессора",
    q2: "GDDR6X GDDR5",
    q3: "Это устройство хранения данных",
    q4: "Это устройство которое временно хранит память",
    q5: "Это устройство которое отвечает за питание устройств компьютера"
};
  // ЭТО ДЛЯ ЭЛЕМЕНТОВ НА СТРАНИЦЕ
  const startScreen = document.getElementById('startScreen');
  const quizContainer = document.getElementById('quiz-container');
  const startBtn = document.getElementById('start-btn');
  //ДАЛЕЕ ЕСЛИ НАЖИМАЕМ НА КНОПКУ 
  startBtn.addEventListener('click',function() {
    startScreen.style.display = 'none'; // строчка для того чтобы убрать приветствие
    quizContainer.style.display = 'block';
  });
  function showFeedback(isCorrect, correctAnswer) {
    const feedbackDiv = document.getElementById('feedback');
    if (isCorrect) {
        feedbackDiv.innerHTML = '✅ Правильно! Молодец!';
        feedbackDiv.style.color = 'green';
        feedbackDiv.style.backgroundColor = '#d4edda';
        feedbackDiv.style.padding = '10px';
        feedbackDiv.style.borderRadius = '5px';
        feedbackDiv.style.marginTop = '10px';
    } else {
        feedbackDiv.innerHTML = `❌ Неправильно! Правильный ответ: "${correctAnswer}"`;
        feedbackDiv.style.color = 'red';
        feedbackDiv.style.backgroundColor = '#f8d7da';
        feedbackDiv.style.padding = '10px';
        feedbackDiv.style.borderRadius = '5px';
        feedbackDiv.style.marginTop = '10px';
    }
}
function checkQuiz() {
    let currentInput = document.querySelector(`input[name="q${currentquestion}"]:checked`);
    
    if (currentInput) {
        const isCorrect = (currentInput.value === "correct");
        const correctAnswerText = correctAnswers[`q${currentquestion}`];
        
        showFeedback(isCorrect, correctAnswerText);
        
        if (isCorrect) {
            score++;
        }
        
        setTimeout(function() {
            currentquestion++;
            
            if (currentquestion <= 5) {
                document.getElementById('question-counter').innerHTML = `Вопрос ${currentquestion} из 5`;
                document.getElementById(`question${currentquestion - 1}`).style.display = 'none';
                document.getElementById(`question${currentquestion}`).style.display = 'block';
                const feedbackDiv = document.getElementById('feedback');
                if (feedbackDiv) {
                    feedbackDiv.innerHTML = '';
                }
            } else {
                document.getElementById('result').innerHTML = `<h2>Твой результат: ${score} из 5</h2>`;
                document.querySelector('button[onclick="checkQuiz()"]').style.display = 'none';
                document.getElementById('restart-btn').style.display = 'block';
                const feedbackDiv = document.getElementById('feedback');
                if (feedbackDiv) {
                    feedbackDiv.innerHTML = '';
                }
            }
        }, 1500);
    } else {
        const feedbackDiv = document.getElementById('feedback');
        feedbackDiv.innerHTML = '⚠️ Пожалуйста, выбери ответ!';
        feedbackDiv.style.color = 'orange';
        feedbackDiv.style.backgroundColor = '#fff3cd';
        feedbackDiv.style.padding = '10px';
        feedbackDiv.style.borderRadius = '5px';
    }
}
  function restartQuiz() {
    // Сбрасываем переменные
    score = 0;
    currentquestion = 1;
    
    // Показываем первый вопрос, скрываем остальные
    for (let i = 1; i <= 5; i++) {
        const questionDiv = document.getElementById(`question${i}`);
        if (questionDiv) {
            if (i === 1) {
                questionDiv.style.display = 'block';
            } else {
                questionDiv.style.display = 'none';
            }
        }
    }
    
    // Сбрасываем выбранные ответы (если были выбраны)
    for (let i = 1; i <= 5; i++) {
        const radios = document.querySelectorAll(`input[name="q${i}"]`);
        radios.forEach(radio => radio.checked = false);
    }
    
    // Обновляем счётчик
    document.getElementById('question-counter').innerHTML = 'Вопрос 1 из 5';
    
    // Очищаем результат и обратную связь
    document.getElementById('result').innerHTML = '';
    document.getElementById('feedback').innerHTML = '';
    
    // Показываем кнопку "Узнать результат" и скрываем кнопку перезапуска
    document.querySelector('button[onclick="checkQuiz()"]').style.display = 'inline-block';
    document.getElementById('restart-btn').style.display = 'none';
    
    // Скроллим наверх (чтобы пользователь увидел первый вопрос)
    window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
